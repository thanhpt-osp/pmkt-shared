name: Reusable Maven Build

on:
  workflow_call:
    inputs:
      java-version:
        description: 'JDK version'
        type: string
        default: '21'
      build-command:
        description: 'Maven command'
        type: string
        default: 'mvn -B clean verify'
      working-directory:
        description: 'Maven project root'
        type: string
        default: '.'
      bootstrap-pmkt-shared:
        description: 'Clone + install pmkt-shared trước build (true cho 6 service)'
        type: boolean
        default: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Bootstrap pmkt-shared (clone + install local m2)
        if: ${{ inputs.bootstrap-pmkt-shared == true && github.repository != 'thanhpt-osp/pmkt-shared' }}
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 "https://x-access-token:${GH_PAT}@github.com/thanhpt-osp/pmkt-shared.git" /tmp/pmkt-shared
          cd /tmp/pmkt-shared
          mvn -B clean install -DskipTests -q

      - name: Build & test
        working-directory: ${{ inputs.working-directory }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ inputs.build-command }}

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ github.run_id }}
          path: '**/target/surefire-reports/'
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Spring Modulith docs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: spring-modulith-docs-${{ github.run_id }}
          path: '**/target/spring-modulith-docs/'
          retention-days: 7
          if-no-files-found: ignore
